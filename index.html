<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxdioKyrosX | Texture Packs</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            /* تم وضع صورتك كخلفية للموقع بالكامل هنا */
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://iili.io/BEmzI14.png');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 60px 0 40px 0;
        }

        header h1 { 
            font-size: 3.5rem; 
            margin: 0; 
            text-shadow: 4px 4px 15px rgba(0,0,0,0.8);
            letter-spacing: 2px;
        }

        header p { 
            font-size: 1.2rem; 
            opacity: 0.9; 
            margin-top: 10px;
            text-shadow: 2px 2px 5px rgba(0,0,0,0.5);
        }

        .container {
            width: 90%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 50px;
        }

        /* كارت الباكس */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.15);
            border-color: #00d4ff;
        }

        .pack-img {
            width: 90px;
            height: 90px;
            border-radius: 12px;
            margin-right: 20px;
            object-fit: cover;
            border: 2px solid rgba(0, 212, 255, 0.5);
        }

        .pack-info { 
            flex-grow: 1; 
            text-align: left; 
        }

        .pack-info h3 { 
            margin: 0; 
            font-size: 1.4rem; 
            color: #fff;
        }

        .download-btn {
            background: linear-gradient(135deg, #00d4ff, #007bff);
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,212,255,0.3);
        }

        /* للهواتف */
        @media (max-width: 600px) {
            .card { flex-direction: column; text-align: center; }
            .pack-img { margin-right: 0; margin-bottom: 15px; }
            header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>Bloxdio KyrosX</h1>
    <p>Official Texture Packs</p>
</header>

<div class="container">
    
    <div class="card">

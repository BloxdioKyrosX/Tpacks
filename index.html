<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxdioKyrosX | Texture Packs</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            /* خلفية اللعبة */
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://wallpaperaccess.com/full/1523291.jpg');
            background-size: cover;
            background-attachment: fixed;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            text-align: center;
            padding: 60px 0 40px 0;
        }

        header h1 { 
            font-size: 3.5rem; 
            margin: 0; 
            text-shadow: 4px 4px 15px rgba(0,0,0,0.7);
            letter-spacing: 2px;
        }

        header p { 
            font-size: 1.2rem; 
            opacity: 0.8; 
            margin-top: 10px;
        }

        .container {
            width: 90%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 50px;
        }

        /* كارت الباكس بنمط Bloxdman */
        .card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 15px;
            display: flex;
            align-items: center;
            padding: 20px;
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: scale(1.02);
            background: rgba(255, 255, 255, 0.12);
            border-color: #00d4ff;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        /* صورة الباكس (صورتك الجديدة) */
        .pack-img {
            width: 90px;
            height: 90px;
            border-radius: 12px;
            margin-right: 20px;
            object-fit: cover;
            border: 2px solid rgba(0, 212, 255, 0.5);
        }

        .pack-info { 
            flex-grow: 1; 
            text-align: left; 
        }

        .pack-info h3 { 
            margin: 0; 
            font-size: 1.4rem; 
            color: #fff;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }

        .download-btn {
            background: linear-gradient(135deg, #00d4ff, #007bff);
            color: white;
            padding: 12px 25px;
            text-decoration: none;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.2s;
            box-shadow: 0 4px 15px rgba(0,212,255,0.3);
        }

        .download-btn:hover {
            filter: brightness(1.1);
            box-shadow: 0 6px 20px rgba(0,212,255,0.5);
        }

        /* للهواتف */
        @media (max-width: 600px) {
            .card { flex-direction: column; text-align: center; }
            .pack-img { margin-right: 0; margin-bottom: 15px; }
            .pack-info { margin-bottom: 15px; }
            header h1 { font-size: 2.5rem; }
        }
    </style>
</head>
<body>

<header>
    <h1>Bloxdio KyrosX</h1>
    <p>Official Texture Packs</p>
</header>

<div class="container">
    
    <div class="card">
        <img src="https://iili.io/BEmzI14.png" class="pack-img" alt="400 Subs Tpack">
        <div class="pack-info">
            <h3>400 Subs Tpack</h3>
        </div>
        <a href="https://www.mediafire.com/file/d5pvbz8k0iujvam/400+Sub+T+pack+(KyrosX).zip/file" target="_blank" class="download-btn">Download</a>
    </div>

</div>

</body>
</html>

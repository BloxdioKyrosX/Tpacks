<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BloxdioKyrosX | Texture Packs</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://wallpaperaccess.com/full/1523291.jpg');
            background-size: cover;
            background-attachment: fixed;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        header h1 { font-size: 3rem; margin: 0; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        header p { font-size: 1.5rem; opacity: 0.9; }

        .container {
            width: 90%;
            max-width: 900px;
            display: grid;
            grid-template-columns: 1fr 1fr; /* هذا يجعلهم صفين بجانب بعض */
            gap: 20px;
            padding-bottom: 50px;
        }

        /* تصميم الكارت مثل Bloxdman */
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            display: flex;
            align-items: center;
            padding: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.2);
            border-color: #00d4ff;
        }

        /* الصورة المصغرة للباك */
        .pack-img {
            width: 80px;
            height: 80px;
            border-radius: 10px;
            margin-right: 15px;
            object-fit: cover;
            background: #333; /* لون مؤقت لو الصورة مش موجودة */
        }

        .pack-info { flex-grow: 1; text-align: left; }
        .pack-info h3 { margin: 0; font-size: 1.2rem; color: #fff; }

        .download-btn {
            background: linear-gradient(135deg, #00d4ff, #007bff);
            color: white;
            padding: 10px 15px;
            text-decoration: none;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        /* للهواتف: اجعلهم تحت بعض */
        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h1>Bloxdio KyrosX</h1>
    <p>Texture Packs</p>
</header>

<div class="container">
    
    <div class="card">
        <img src="https://via.placeholder.com/80" class="pack-img" alt="Pack Icon">
        <div class="pack-info">
            <h3>Glacial 32x</h3>
        </div>
        <a href="https://www.mediafire.com/file/d5pvbz8k0iujvam/400+Sub+T+pack+(KyrosX).zip/file" target="_blank" class="download-btn">Download</a>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/80" class="pack-img" alt="Pack Icon">
        <div class="pack-info">
            <h3>Astra (Fixed)</h3>
        </div>
        <a href="#" class="download-btn">Download</a>
    </div>

</div>

</body>
</html>
